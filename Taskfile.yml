version: "3"

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmds:
      - task --list

  detect:
    desc: "Print detected OS (macos or arch)"
    silent: true
    cmds:
      - bash scripts/detect-os.sh

  check:
    desc: "Verify prerequisites (stow, git, task) are installed"
    silent: true
    cmds:
      - bash scripts/check.sh

  list:
    desc: "List Stow packages — output is <area>/<package>, use as: task dry-run AREA=<area> PACKAGE=<package>"
    silent: true
    cmds:
      - find stow -mindepth 2 -maxdepth 2 -type d -print | sed 's|^stow/||'

  dry-run:
    desc: "Dry-run a Stow package — usage: task dry-run AREA=<common> PACKAGE=<name> (macos/arch are future areas)"
    silent: true
    preconditions:
      - sh: '[ -n "{{.AREA}}" ]'
        msg: "AREA is required: common, macos, or arch"
      - sh: '[ -n "{{.PACKAGE}}" ]'
        msg: "PACKAGE is required, e.g. PACKAGE=git"
    cmds:
      - stow --dir=stow/{{.AREA}} --target="$HOME" --simulate {{.PACKAGE}}

  deps:check:zsh:
    desc: "Check zsh shell-tier dependencies (fzf, zoxide, eza, bat, oh-my-posh, zinit) — read-only, never installs"
    silent: true
    cmds:
      - bash scripts/check-zsh-deps.sh

  deps:check:nvim:
    desc: "Check Neovim-tier dependencies (nvim, tree-sitter, rg, fd, node) — read-only, never installs"
    silent: true
    cmds:
      - bash scripts/check-nvim-deps.sh

  deps:brew:
    desc: "Print manual install commands for macOS / Homebrew — prints only, does not install"
    silent: true
    cmds:
      - |
        echo ""
        echo "Shell dependency install commands (macOS / Homebrew)"
        echo "======================================================"
        echo ""
        echo "Step 1 — Install all tools via Brewfile:"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  brew bundle --file=packages/Brewfile"
        echo ""
        echo "Step 2 — Install zinit (one-time manual clone):"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  git clone https://github.com/zdharma-continuum/zinit.git \\"
        echo "    \"\${XDG_DATA_HOME:-\$HOME/.local/share}/zinit/zinit.git\""
        echo ""
        echo "Step 3 — Neovim extras (Brewfile installs neovim/node/python;"
        echo "         treesitter parsers also need a C compiler):"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  xcode-select --install"
        echo "  npm install -g tree-sitter-cli   # CLI for treesitter (brew formula is lib-only)"
        echo ""
        echo "  Then launch Neovim once to install plugins + LSP servers:"
        echo "  nvim --headless \"+Lazy! sync\" +qa"
        echo ""
        echo "Step 4 — Verify:"
        echo ""
        echo "  task deps:check:zsh"
        echo ""

  deps:arch:
    desc: "Print manual install commands for Arch / EndeavourOS — prints only, does not install"
    silent: true
    cmds:
      - |
        echo ""
        echo "Shell dependency install commands (Arch / EndeavourOS)"
        echo "======================================================="
        echo ""
        echo "Step 1 — Install pacman packages:"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  sudo pacman -S git stow go-task fzf zoxide eza bat \\"
        echo "    neovim ripgrep fd nodejs npm python python-pipx base-devel"
        echo ""
        echo "Step 2 — Install AUR packages (requires yay or paru):"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  yay -S oh-my-posh-bin"
        echo ""
        echo "Step 3 — Install zinit (one-time manual clone):"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  git clone https://github.com/zdharma-continuum/zinit.git \\"
        echo "    \"\${XDG_DATA_HOME:-\$HOME/.local/share}/zinit/zinit.git\""
        echo ""
        echo "Step 4 — Neovim extras (treesitter parsers need a C compiler):"
        echo ""
        echo "  ⚠️  MANUAL STEP — review before running"
        echo "  sudo pacman -S base-devel tree-sitter-cli"
        echo ""
        echo "  Then launch Neovim once to install plugins + LSP servers:"
        echo "  nvim --headless \"+Lazy! sync\" +qa"
        echo ""
        echo "Step 5 — Verify:"
        echo ""
        echo "  task deps:check:zsh"
        echo ""

  git:bootstrap:dry-run:
    desc: "Show include.path entries that would be added to ~/.gitconfig — no changes made. MANUAL USE ONLY: never run automatically"
    silent: true
    cmds:
      - |
        echo ""
        echo "git:bootstrap dry-run — no changes will be made"
        echo "================================================="
        echo ""
        if [[ -f "$HOME/.gitconfig" ]]; then
          echo "~/.gitconfig exists: yes"
        else
          echo "~/.gitconfig exists: no (will be created by git on first --add)"
        fi
        echo ""
        echo "Current include.path values:"
        git config --global --get-all include.path 2>/dev/null || echo "  (none)"
        echo ""
        echo "Required entries:"
        for inc in "~/.config/git/config-common" "~/.config/git/aliases"; do
          if git config --global --get-all include.path 2>/dev/null | grep -qxF "$inc"; then
            echo "  already present: include.path = $inc"
          else
            echo "  would add:       include.path = $inc"
          fi
        done
        echo ""
        if [[ -f "$HOME/.gitconfig" ]]; then
          echo "Backup: yes — a timestamped backup would be created before any change"
        else
          echo "Backup: not needed — ~/.gitconfig does not exist yet"
        fi
        echo ""

  git:bootstrap:
    desc: "Wire ~/.gitconfig to managed Git config — idempotent, creates timestamped backup. MANUAL USE ONLY: never run automatically"
    silent: true
    cmds:
      - |
        GITCONFIG="$HOME/.gitconfig"
        if [[ -f "$GITCONFIG" ]]; then
          BACKUP="${GITCONFIG}.bak.$(date +%Y%m%d%H%M%S)"
          cp "$GITCONFIG" "$BACKUP"
          echo "Backup created: $BACKUP"
        else
          echo "~/.gitconfig does not exist — git will create it on first --add"
        fi
        echo ""
        for inc in "~/.config/git/config-common" "~/.config/git/aliases"; do
          if git config --global --get-all include.path 2>/dev/null | grep -qxF "$inc"; then
            echo "skip (already present): $inc"
          else
            git config --global --add include.path "$inc"
            echo "added: $inc"
          fi
        done
        echo ""
        echo "Final include.path values:"
        git config --global --get-all include.path 2>/dev/null || echo "  (none)"
        echo ""

  zsh:bootstrap:dry-run:
    desc: "Show what zsh:bootstrap would do to ~/.zshrc — no changes made. MANUAL USE ONLY: never run automatically"
    silent: true
    cmds:
      - |
        echo ""
        echo "zsh:bootstrap dry-run — no changes will be made"
        echo "================================================="
        echo ""
        ZSHRC="$HOME/.zshrc"
        BLOCK_MARKER="# >>> dotfiles managed zsh layer >>>"
        if [[ -L "$ZSHRC" ]]; then
          echo "~/.zshrc is a symlink — would REFUSE (symlink)"
          echo ""
          exit 0
        fi
        if [[ -f "$ZSHRC" ]]; then
          echo "~/.zshrc exists: yes"
          echo ""
          if grep -qF "$BLOCK_MARKER" "$ZSHRC"; then
            echo "managed block already present — no changes needed"
            echo "Backup: not needed"
          else
            echo "managed block would be appended"
            echo "Backup: yes — a timestamped backup would be created before any change"
          fi
        else
          echo "~/.zshrc exists: no"
          echo "file does not exist — would be created"
          echo "Backup: not needed"
        fi
        echo ""
        echo "Block that would be appended:"
        echo "------------------------------"
        echo ""
        echo "# >>> dotfiles managed zsh layer >>>"
        echo "if [[ -r \"\$HOME/.config/zsh/index.zsh\" ]]; then"
        echo "  source \"\$HOME/.config/zsh/index.zsh\""
        echo "fi"
        echo "# <<< dotfiles managed zsh layer <<<"
        echo ""

  zsh:bootstrap:
    desc: "Wire ~/.zshrc to managed zsh layer — idempotent, creates timestamped backup. MANUAL USE ONLY: never run automatically"
    silent: true
    cmds:
      - |
        ZSHRC="$HOME/.zshrc"
        BLOCK_MARKER="# >>> dotfiles managed zsh layer >>>"
        if [[ -L "$ZSHRC" ]]; then
          echo "REFUSED: ~/.zshrc is a symlink — will not write into a managed symlink target"
          exit 1
        fi
        if [[ -f "$ZSHRC" ]]; then
          if grep -qF "$BLOCK_MARKER" "$ZSHRC"; then
            echo "Managed block already present — nothing to do"
            exit 0
          fi
          BACKUP="${ZSHRC}.bak.$(date +%Y%m%d%H%M%S)"
          cp "$ZSHRC" "$BACKUP"
          echo "Backup created: $BACKUP"
        else
          echo "~/.zshrc does not exist — creating"
        fi
        printf '\n# >>> dotfiles managed zsh layer >>>\nif [[ -r "$HOME/.config/zsh/index.zsh" ]]; then\n  source "$HOME/.config/zsh/index.zsh"\nfi\n# <<< dotfiles managed zsh layer <<<\n' >> "$ZSHRC"
        echo "Managed block appended to ~/.zshrc"
        echo ""
        echo "Verify with:"
        echo "  exec zsh         # reload current shell"
        echo "  zsh -n ~/.zshrc  # syntax check"
        echo ""
